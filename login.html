<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script type="text/javascript" src="https://appleid.cdn-apple.com/appleauth/static/jsapi/appleid/1/en_US/appleid.auth.js"></script>

    <style>
        :root {
            --primary-bg: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #111827;
            --text-sub: #6b7280;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --btn-google-hover: #f9fafb;
            --btn-apple-bg: #000000;
            --btn-apple-hover: #1f1f1f;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--primary-bg);
            background-image: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 16px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 { margin: 0 0 0.5rem; font-size: 1.5rem; color: var(--text-main); }
        .subtitle { color: var(--text-sub); font-size: 0.95rem; margin-bottom: 2rem; }

        .btn-wrapper { display: flex; flex-direction: column; gap: 1rem; }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.875rem;
            border-radius: 8px;
            font-weight: 500;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            position: relative;
            border: none; /* Reset for button tag */
            width: 100%;
        }

        .btn-google {
            background-color: white;
            border: 1px solid #e5e7eb;
            color: var(--text-main);
        }
        .btn-google:hover { background-color: var(--btn-google-hover); }

        .btn-apple {
            background-color: var(--btn-apple-bg);
            border: 1px solid transparent;
            color: white;
        }
        .btn-apple:hover { background-color: var(--btn-apple-hover); }

        .social-btn i { margin-right: 10px; font-size: 1.2rem; }
        
        .footer { margin-top: 2rem; font-size: 0.8rem; color: var(--text-sub); }
        .footer a { color: #4F46E5; text-decoration: none; }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>Welcome back</h1>
        <p class="subtitle">Please enter your details to sign in.</p>

        <div class="btn-wrapper">
            <button id="google-btn" class="social-btn btn-google">
                <i class="fa-brands fa-google" style="color: #DB4437;"></i>
                Continue with Google
            </button>

            <button id="apple-btn" class="social-btn btn-apple">
                <i class="fa-brands fa-apple"></i>
                Continue with Apple
            </button>
        </div>

        <div class="footer">
            <p>Don't have an account? <a href="#">Sign up</a></p>
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURATION SECTION (REPLACE THESE!)
        // ==========================================
        const GOOGLE_CLIENT_ID = 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com';
        const APPLE_CLIENT_ID  = 'com.yourdomain.service'; 
        const REDIRECT_URI     = 'https://yourdomain.com/callback'; // Required for Apple
        // ==========================================

        // --- 1. GOOGLE LOGIN LOGIC ---
        let googleTokenClient;

        function initGoogle() {
            if (typeof google === 'undefined') return;
            
            googleTokenClient = google.accounts.oauth2.initTokenClient({
                client_id: GOOGLE_CLIENT_ID,
                scope: 'https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email',
                callback: (response) => {
                    if (response.access_token) {
                        console.log('Google Success! Access Token:', response.access_token);
                        // TODO: Send this token to your backend to verify user
                        alert('Google Login Successful! Check Console for Token.');
                    }
                },
            });
        }

        document.getElementById('google-btn').addEventListener('click', () => {
            if (googleTokenClient) {
                googleTokenClient.requestAccessToken();
            } else {
                alert('Google SDK not loaded or Client ID invalid.');
            }
        });

        // --- 2. APPLE LOGIN LOGIC ---
        document.getElementById('apple-btn').addEventListener('click', async () => {
            try {
                // Initialize Apple SDK
                AppleID.auth.init({
                    clientId : APPLE_CLIENT_ID,
                    scope : 'name email',
                    redirectURI : REDIRECT_URI,
                    state : 'origin:web',
                    usePopup : true
                });

                // Trigger Sign In
                const data = await AppleID.auth.signIn();
                console.log('Apple Success!', data);
                // TODO: Send data.authorization.id_token to your backend
                alert('Apple Login Successful!');
                
            } catch (error) {
                console.error('Apple Login Failed:', error);
                alert('Apple Login setup required (Check Client ID)');
            }
        });

        // Initialize Google SDK once window loads
        window.onload = () => {
            initGoogle();
        };
    </script>
</body>
</html>
